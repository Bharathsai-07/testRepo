<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        button { /* ISSUE 2: Corrected CSS selector from 'buttn' to 'button' */
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <main> <!-- ISSUE 5: Wrapped primary content within a <main> semantic element -->
        <h1>Welcome to My Website</h1> <!-- ISSUE 1: Changed closing tag from </1> to </h1> -->
        <p>This is a simple HTML page.</p>

        <button>Click Me</button> <!-- ISSUE 4: Removed inline onclick attribute -->
    </main>

    <script>
        function showMessage() { /* ISSUE 3: Renamed JavaScript function from showMessge() to showMessage() */
            alert("Hello! You clicked the button.");
        }

        // ISSUE 4: Separated JavaScript from HTML by attaching event listeners programmatically
        document.addEventListener('DOMContentLoaded', function() {
            const myButton = document.querySelector('button');
            if (myButton) {
                myButton.addEventListener('click', showMessage);
            }
        });
    </script>

</body>
</html>
