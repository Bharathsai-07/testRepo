<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        button { /* Corrected typo: 'buttn' to 'button' */
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1> <!-- Corrected closing tag: </1> to </h1> -->
    <p>This is a simple HTML page.</p>

    <button onclick="showMessage()">Click Me</button>

    <script>
        /**
         * Displays an alert message to the user.
         * This function takes no arguments, so no argument validation is needed.
         * @returns {void}
         */
        function showMessage() { /* Corrected function name: 'showMessge' to 'showMessage' to match onclick attribute */
            alert("Hello! You clicked the button.");
        }
    </script>

</body>
</html>
